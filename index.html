<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SECURE NODE // LEVEL 2</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
    font-family: monospace;
    color:#00ff9d;
    overflow:hidden;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background: repeating-linear-gradient(
        to bottom,
        rgba(0,255,157,0.05),
        rgba(0,255,157,0.05) 1px,
        transparent 1px,
        transparent 3px
    );
    pointer-events:none;
}

.box{
    width:420px;
    border:1px solid #00ff9d;
    padding:18px;
    background:rgba(0,0,0,0.7);
    box-shadow:0 0 25px rgba(0,255,157,0.2);
}

.title{
    text-align:center;
    letter-spacing:3px;
    margin-bottom:10px;
    animation:glitch 2s infinite;
}

@keyframes glitch{
    0%{transform:translate(0)}
    20%{transform:translate(-1px,1px)}
    40%{transform:translate(1px,-1px)}
    60%{transform:translate(-1px,0)}
    80%{transform:translate(1px,1px)}
    100%{transform:translate(0)}
}

label{
    font-size:12px;
    opacity:0.7;
    display:block;
    margin-top:10px;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    background:black;
    border:1px solid #00ff9d;
    color:#00ff9d;
    outline:none;
}

button{
    width:100%;
    margin-top:12px;
    padding:10px;
    background:#00ff9d;
    border:none;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#00cc7a;
}

#log{
    margin-top:12px;
    height:120px;
    overflow:hidden;
    font-size:12px;
    border-top:1px solid rgba(0,255,157,0.3);
    padding-top:10px;
}

.ok{ color:#00ff9d; }
.err{ color:#ff3b3b; }
.sys{ color:#8affff; }

.small{
    font-size:11px;
    opacity:0.5;
    margin-top:8px;
}
</style>
</head>

<body>

<div class="box">
    <div class="title">NSA SECURE NODE // LEVEL 2</div>

    <label>AGENT ID</label>
    <input id="user">

    <label>ACCESS KEY</label>
    <input type="password" id="pass">

    <button onclick="login()">AUTHENTICATE</button>

    <div id="log"></div>

    <div class="small">session monitored • intrusion detection active • quantum encryption simulated</div>
</div>

<script>

let attempts = 0;
let locked = false;
let creds = null;

// 🔥 CARICA CREDENZIALI DA JSONBIN
async function loadCreds(){
    try{
        const res = await fetch("https://api.jsonbin.io/v3/b/69e615d236566621a8d18c15/latest", {
            headers: {
                "X-Access-Key": "$2a$10$lgHYYX7ZCgjHwe6llPCQ5.C9VlTCwrN73jzgTnLGZ2om404N1W7EC"
            }
        });

        const data = await res.json();

        console.log("FULL RESPONSE:", data);   // debug
        console.log("RECORD:", data.record);

        creds = data.record;

    } catch(e){
        console.error("Errore caricamento credenziali", e);
    }
}
// avvio caricamento
loadCreds();

function log(msg, cls="sys"){
    const log = document.getElementById("log");
    const line = document.createElement("div");
    line.className = cls;
    line.innerText = "> " + msg;
    log.appendChild(line);
    log.scrollTop = log.scrollHeight;
}

function wait(ms){ return new Promise(r => setTimeout(r, ms)); }

async function login(){

    if(locked){
        log("SYSTEM LOCKED. WAIT REQUIRED.", "err");
        return;
    }

if(!creds || !creds.user){
    log("credentials corrupted or missing", "err");
    return;
}
    const u = document.getElementById("user").value;
    const p = document.getElementById("pass").value;

    document.getElementById("log").innerHTML = "";

    log("initializing secure channel...");
    await wait(600);
    log("checking credentials hash...");
    await wait(600);
    log("contacting authentication server...");
    await wait(800);

    if(u === creds.user && p === creds.pass){
        log("ACCESS GRANTED", "ok");
        log("welcome agent", "ok");

await wait(400);
log("ACCESS GRANTED", "ok");

await wait(300);
log("initializing endpoint decryption...", "sys");

await wait(500);
log("decrypting target endpoint: █░░░░░░░░░", "sys");
await wait(200);
log("decrypting target endpoint: ███░░░░░░░", "sys");
await wait(200);
log("decrypting target endpoint: █████░░░░░", "sys");
await wait(200);
log("decrypting target endpoint: ███████░░░", "sys");
await wait(200);
log("decrypting target endpoint: ██████████", "sys");

// 🔐 URL offuscato
const encoded = "aHR0cHM6Ly9lbmlnbWEzcGx1cy5uZXRsaWZ5LmFwcC9zZWNyZXQuaHRtbA==";

await wait(500);
const url = atob(encoded);

log("endpoint resolved", "ok");

// 🔐 genera token temporaneo
const token = btoa(Date.now());

// salva in sessione browser
sessionStorage.setItem("token", token);

log("session token generated", "sys");

await wait(300);
log("redirecting...", "sys");

// 🚀 redirect con token
window.location.href = url + "?t=" + token;

    } else {
        log("ACCESS DENIED", "err");
        log("invalid credentials detected", "err");

        attempts++;

        if(attempts >= 3){
            locked = true;
            log("TOO MANY ATTEMPTS", "err");
            log("SYSTEM LOCKED FOR 10 SECONDS", "err");

            setTimeout(()=>{
                locked = false;
                attempts = 0;
                log("SYSTEM UNLOCKED", "ok");
            },10000);
        }
    }
}

</script>

</body>
</html>
