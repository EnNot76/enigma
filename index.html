<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Enigma³ Pro Max</title>
<style>
/* LIGHT THEME */
:root{
  --bg-1:#f5f1e9;
  --bg-2:#ece6db;
  --bg-3:#e2dbcf;
  --glass:rgba(255,255,255,0.55);
  --border:rgba(131,96,28,0.18);
  --panel:rgba(255,255,255,0.82);
  --panel-soft:rgba(255,255,255,0.60);
  --gold:#b98a26;
  --gold-2:#e1ba64;
  --text:#1f1a14;
  --muted:rgba(31,26,20,0.7);
  --shadow:0 18px 50px rgba(43,27,5,0.14);
  --danger:#d84b62;
  --success:#00b083;
  --accent-soft:rgba(185,138,38,0.18);
}

/* DARK THEME – gold in alto a sinistra → grigio medio */
html[data-theme="dark"]{
  --bg-1:#e4c171;
  --bg-2:#5b5850;
  --bg-3:#363638;
  --glass:rgba(18,18,22,0.94);
  --border:rgba(249,210,134,0.26);
  --panel:rgba(22,22,26,0.98);
  --panel-soft:rgba(32,32,38,0.96);
  --gold:#c29b4a;
  --gold-2:#e4c171;
  --text:#f5f2ea;
  --muted:rgba(230,225,210,0.78);
  --shadow:0 22px 60px rgba(0,0,0,0.75);
  --danger:#ff5b73;
  --success:#00d9a0;
  --accent-soft:rgba(217,179,91,0.22);
}

*{box-sizing:border-box}
html,body{margin:0;min-height:100%}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:14px 10px;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top left, rgba(217,179,91,0.18), transparent 28%),
    radial-gradient(circle at top right, rgba(92,72,180,0.12), transparent 32%),
    linear-gradient(135deg,var(--bg-1),var(--bg-2) 56%,var(--bg-3));
  overflow-x:hidden;
  overflow-y:auto;
  position:relative;
  transition:background .4s cubic-bezier(0.16,1,0.3,1), color .35s cubic-bezier(0.16,1,0.3,1);
}

/* in dark: gold alto sx → grigio medio */
html[data-theme="dark"] body{
  background:
    radial-gradient(circle at top left, rgba(228,193,113,0.40), transparent 38%),
    radial-gradient(circle at bottom right, rgba(40,40,48,0.85), transparent 60%),
    linear-gradient(135deg,#e4c171 0%, #7a7363 45%, #3b3c3f 100%);
}

body::before{
  content:"";
  position:fixed;
  width:420px;
  height:420px;
  top:14%;
  left:50%;
  transform:translateX(-50%);
  background:
    radial-gradient(circle at 30% 20%, rgba(243,214,138,0.25), transparent 55%),
    radial-gradient(circle at 70% 80%, rgba(117,92,255,0.16), transparent 55%);
  filter:blur(28px);
  opacity:.72;
  animation:floatGlow 20s ease-in-out infinite alternate;
  pointer-events:none;
}

@keyframes floatGlow{
  0%{transform:translateX(-50%) scale(1);opacity:.58}
  50%{transform:translateX(-48%) scale(1.05);opacity:.82}
  100%{transform:translateX(-52%) scale(.98);opacity:.62}
}

.container{
  width:min(96vw,420px);
  padding:14px;
  border-radius:18px;
  background:var(--glass);
  border:1px solid var(--border);
  box-shadow:var(--shadow);
  backdrop-filter:blur(18px) saturate(135%);
  -webkit-backdrop-filter:blur(18px) saturate(135%);
  position:relative;
  z-index:1;
}

.container::after{
  content:"";
  position:absolute;
  inset:0;
  border-radius:18px;
  padding:1px;
  background:linear-gradient(135deg,
    rgba(255,255,255,0.20),
    rgba(217,179,91,0.22),
    rgba(255,255,255,0.06)
  );
  -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
  pointer-events:none;
}

.top-bar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}

.brand-wrap{
  display:flex;
  align-items:center;
  gap:10px;
}

/* glitch + gold title */
.brand{
  position:relative;
  display:inline-block;
  margin:0;
  font-size:20px;
  letter-spacing:2px;
  text-transform:uppercase;
  background:linear-gradient(
    180deg,
    #f9f2d0 0%,
    #f3dd9b 16%,
    #caa55a 32%,
    #8d6a2f 45%,
    #f7e4a6 60%,
    #b58632 78%,
    #fcecc1 100%
  );
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 12px rgba(0,0,0,0.35);
  user-select:none;
  animation:hackShake 2.4s infinite steps(2,end);
}

.brand::before,
.brand::after{
  content:attr(data-text);
  position:absolute;
  inset:0;
  pointer-events:none;
  opacity:.38;
}

.brand::before{
  color:rgba(255,0,90,.34);
  transform:translate(.8px,-.2px);
  clip-path:polygon(0 0,100% 0,100% 42%,0 42%);
  animation:glitchTop 2.6s infinite linear;
}

.brand::after{
  color:rgba(0,220,255,.34);
  transform:translate(-.8px,.3px);
  clip-path:polygon(0 60%,100% 60%,100% 100%,0 100%);
  animation:glitchBottom 2.1s infinite linear;
}

@keyframes hackShake{
  0%,86%,100%{transform:translate(0,0) skewX(0deg)}
  87%{transform:translate(-.5px,.4px) skewX(1deg)}
  88%{transform:translate(1px,-.2px) skewX(-1deg)}
  89%{transform:translate(-1.2px,.5px) skewX(.5deg)}
  90%{transform:translate(.4px,-.7px) skewX(-.8deg)}
  91%{transform:translate(-.2px,.3px) skewX(0deg)}
  92%{transform:translate(0,0) skewX(0deg)}
}

@keyframes glitchTop{
  0%,90%,100%{transform:translate(0,0);opacity:0}
  91%{transform:translate(-1px,-1px);opacity:.55}
  92%{transform:translate(1px,0);opacity:.25}
  93%{transform:translate(-1px,1px);opacity:.45}
  94%{transform:translate(0,0);opacity:0}
}

@keyframes glitchBottom{
  0%,84%,100%{transform:translate(0,0);opacity:0}
  85%{transform:translate(1px,.5px);opacity:.4}
  86%{transform:translate(-1px,-.5px);opacity:.22}
  87%{transform:translate(.5px,1px);opacity:.5}
  88%{transform:translate(0,0);opacity:0}
}

.badge{
  padding:5px 10px;
  border-radius:999px;
  font-size:10px;
  font-weight:800;
  letter-spacing:1.2px;
  background:linear-gradient(180deg,var(--gold-2),var(--gold));
  color:#231808;
  box-shadow:0 8px 20px rgba(185,138,38,0.28);
  cursor:pointer;
}

.header-actions{
  display:flex;
  align-items:center;
  gap:8px;
}

.icon-btn{
  width:38px;
  height:38px;
  border-radius:12px;
  display:grid;
  place-items:center;
  border:1px solid var(--border);
  background:var(--panel-soft);
  color:var(--text);
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:transform .18s cubic-bezier(0.16,1,0.3,1),
             background .25s cubic-bezier(0.16,1,0.3,1),
             border-color .25s cubic-bezier(0.16,1,0.3,1),
             box-shadow .25s cubic-bezier(0.16,1,0.3,1);
}

.theme-icon{font-size:16px;line-height:1}
.info-icon{font-size:15px;line-height:1}

label{
  display:block;
  margin-top:10px;
  margin-bottom:6px;
  font-size:12px;
  color:var(--muted);
  letter-spacing:.45px;
}

.input-box{position:relative}

input,textarea{
  width:100%;
  padding:11px 12px;
  border-radius:12px;
  border:1px solid rgba(0,0,0,0.08);
  background:var(--panel);
  color:var(--text);
  outline:none;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
  font-size:14px;
  transition:border-color .2s cubic-bezier(0.16,1,0.3,1),
           box-shadow .2s cubic-bezier(0.16,1,0.3,1),
           background .35s cubic-bezier(0.16,1,0.3,1),
           color .35s cubic-bezier(0.16,1,0.3,1);
}

input:focus,textarea:focus{
  border-color:rgba(185,138,38,0.7);
  box-shadow:0 0 0 3px rgba(185,138,38,0.18);
}

textarea{
  min-height:120px;
  resize:vertical;
}

.eye{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  color:var(--gold-2);
  opacity:.9;
  font-size:14px;
}

#strengthBar{
  height:8px;
  background:rgba(0,0,0,0.06);
  border-radius:999px;
  margin-top:8px;
  overflow:hidden;
  border:1px solid rgba(0,0,0,0.08);
}

#strengthFill{
  height:100%;
  width:0%;
  border-radius:999px;
  background:linear-gradient(90deg,#8a6b2f,var(--gold),var(--gold-2));
  transition:width .3s ease, background .3s ease;
}

#strengthText{
  margin-top:6px;
  font-size:12px;
  color:var(--muted);
}

.primary-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:12px;
}

.secondary-row{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-top:8px;
}

/* Gold shine buttons */
button{
  width:100%;
  padding:10px 10px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  color:#1a1205;
  font-weight:700;
  letter-spacing:.4px;
  background:linear-gradient(180deg,var(--gold-2),var(--gold));
  box-shadow:0 10px 24px rgba(185,138,38,0.22);
  font-size:12px;
  position:relative;
  overflow:hidden;
  transition:transform .18s cubic-bezier(0.16,1,0.3,1),
           filter .18s cubic-bezier(0.16,1,0.3,1),
           box-shadow .18s cubic-bezier(0.16,1,0.3,1),
           opacity .18s cubic-bezier(0.16,1,0.3,1);
}

button::before{
  content:"";
  position:absolute;
  top:-40%;
  left:-60%;
  width:40%;
  height:180%;
  background:linear-gradient(120deg, rgba(255,255,255,0.0), rgba(255,255,255,0.7), rgba(255,255,255,0.0));
  transform:skewX(-22deg);
  opacity:0;
}

button:hover::before{
  animation:goldShine 0.8s ease-out forwards;
}

@keyframes goldShine{
  0%{transform:translateX(0) skewX(-22deg);opacity:0;}
  20%{opacity:0.9;}
  100%{transform:translateX(260%) skewX(-22deg);opacity:0;}
}

button:hover{
  transform:translateY(-1px);
  filter:brightness(1.03);
  box-shadow:0 14px 28px rgba(185,138,38,0.28);
}

button:active{transform:translateY(0)}

.secondary-btn{
  background:linear-gradient(180deg,rgba(255,255,255,0.9),rgba(235,220,190,0.95));
  color:var(--text);
  border:1px solid rgba(185,138,38,0.22);
  box-shadow:none;
  font-weight:600;
  letter-spacing:.1px;
}

/* Toggle TOOLS+QR button (sostituisce Main/QR/Tools) */
.tools-toggle-row{
  margin-top:10px;
}

.tools-toggle-btn{
  width:100%;
  border-radius:999px;
  font-size:11px;
  letter-spacing:.9px;
  text-transform:uppercase;
}

.section-box{
  margin-top:10px;
  padding:10px;
  border-radius:14px;
  background:var(--panel-soft);
  border:1px solid rgba(185,138,38,0.18);
}

/* QR container */
#qrContainer{
  margin-top:6px;
  padding:8px;
  border-radius:14px;
  background:rgba(0,0,0,0.06);
  border:1px solid rgba(185,138,38,0.18);
  text-align:center;
}

#qrContainer:empty{
  padding:0;
  border:none;
  background:transparent;
}

#qr-reader{
  width:100%;
  margin-top:10px;
  border-radius:14px;
  overflow:hidden;
  border:1px solid rgba(185,138,38,0.18);
}

.footer-note{
  font-size:10px;
  opacity:.62;
  margin-top:8px;
  text-align:right;
  letter-spacing:.4px;
}

/* Toast */
.toast{
  position:fixed;
  left:50%;
  bottom:18px;
  transform:translateX(-50%) translateY(120%);
  min-width:240px;
  max-width:420px;
  padding:14px 18px;
  border-radius:18px;
  background:rgba(8,8,12,0.96);
  color:#f5f2ea;
  font-size:13px;
  display:flex;
  align-items:center;
  gap:10px;
  box-shadow:0 18px 40px rgba(0,0,0,0.8);
  opacity:0;
  pointer-events:none;
  z-index:9999;
}

.toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
  pointer-events:auto;
  animation:toastSlide 0.3s ease-out, toastFade 0.3s ease-in 2.8s forwards;
}

.toast-icon{
  font-size:16px;
}

.toast-success{border:1px solid rgba(0,184,131,0.9)}
.toast-error{border:1px solid rgba(216,75,98,0.9)}
.toast-info{border:1px solid rgba(217,179,91,0.9)}

@keyframes toastSlide{
  from{transform:translateX(-50%) translateY(120%);opacity:0}
  to{transform:translateX(-50%) translateY(0);opacity:1}
}

@keyframes toastFade{
  from{opacity:1;transform:translateX(-50%) translateY(0)}
  to{opacity:0;transform:translateX(-50%) translateY(120%)}
}

/* Terminal mode */
.terminal-mode{
  background:#040404 !important;
  color:#d7ffcb !important;
  font-family:"Courier New",monospace;
}

.terminal-mode input,
.terminal-mode textarea{
  background:#000;
  color:#00ff88;
  border:1px solid #00ff88;
}

.terminal-mode button,
.terminal-mode .secondary-btn,
.terminal-mode .icon-btn{
  background:transparent;
  color:#9cffbf;
  border:1px solid rgba(156,255,191,.4);
  box-shadow:none;
}

.terminal-mode .container,
.terminal-mode .section-box,
.terminal-mode .footer-note{
  background:#000;
  border-color:rgba(90,255,160,.24);
  box-shadow:0 0 24px rgba(90,255,160,.10);
  backdrop-filter:none;
}

/* Dark: pill chiare e testo nero sui bottoni secondari */
html[data-theme="dark"] .secondary-btn{
  color:#0b0905 !important;
}

@media (max-width:420px){
  .container{width:96vw;padding:12px;border-radius:16px}
  .brand{font-size:18px}
  textarea{min-height:110px}
}
</style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <div class="brand-wrap">
      <h1 class="brand" data-text="Enigma³">Enigma³</h1>
      <span class="badge" id="proBadge">PRO MAX</span>
    </div>
    <div class="header-actions">
      <button class="icon-btn" type="button" id="themeToggle" onclick="toggleTheme()" aria-label="Toggle theme" title="Toggle light/dark mode">
        <span class="theme-icon" id="themeIcon">☀</span>
      </button>
      <button class="icon-btn" type="button" onclick="showSecurityToast()" aria-label="Security info" title="Security profile">
        <span class="info-icon">i</span>
      </button>
    </div>
  </div>

  <!-- MAIN -->
  <div id="tab-encrypt">
    <label>Password</label>
    <div class="input-box">
      <input type="password" id="key" autocomplete="off" />
      <span class="eye" onclick="togglePass()">👁</span>
    </div>

    <div id="strengthBar"><div id="strengthFill"></div></div>
    <div id="strengthText"></div>

    <label style="margin-top:10px;">Text</label>
    <textarea id="message" placeholder="Write or paste your text..."></textarea>

    <div class="primary-row">
      <button onclick="encrypt()">ENCRYPT</button>
      <button onclick="decrypt()">DECRYPT</button>
    </div>

    <div class="secondary-row">
      <button class="secondary-btn" onclick="copyText()">COPY</button>
      <button class="secondary-btn" onclick="exportFile()">DOWNLOAD</button>
      <button class="secondary-btn" onclick="shareText()">SHARE</button>
    </div>

    <!-- UNICO TOGGLE TOOLS+QR -->
    <div class="tools-toggle-row">
      <button id="toolsToggleBtn" class="tools-toggle-btn secondary-btn" type="button" onclick="toggleToolsPanel()">
        TOOLS + QR
      </button>
    </div>

    <!-- Pannello combinato TOOLS + QR -->
    <div id="toolsPanel" class="section-box" style="display:none;">
      <div class="secondary-row" style="margin-top:0;">
        <button class="secondary-btn" id="scanBtn" onclick="startQRScan()">SCAN QR</button>
        <button class="secondary-btn" onclick="generateQR()">GEN QR</button>
        <button class="secondary-btn" onclick="saveQR()">SAVE QR</button>
      </div>
      <div id="qrContainer"></div>
      <div id="qr-reader"></div>

      <div class="secondary-row" style="margin-top:10px;">
        <button class="secondary-btn" onclick="generatePassword()">GEN PASSWORD</button>
        <button class="secondary-btn" onclick="clearAll()">RESET</button>
        <button class="secondary-btn" onclick="toggleToolsPanel()">CLOSE PANEL</button>
      </div>
    </div>
  </div>

  <div class="footer-note">Enigma³ Pro Max • © 2026 Enzo Notari • All Rights Reserved</div>
</div>

<!-- Toast -->
<div id="toast" class="toast">
  <span id="toastIcon" class="toast-icon">ℹ</span>
  <span id="toastText">Message</span>
</div>

<!-- QR libs -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
<script>
const enc = new TextEncoder();
const dec = new TextDecoder();

let qrScanner;
let qrScanning = false;
let manualTheme = null;
let toastTimeout = null;

function setStatus(text){
  if(text) showToast(text,'info');
}

function showToast(message, type = 'info'){
  const toast = document.getElementById('toast');
  const text = document.getElementById('toastText');
  const icon = document.getElementById('toastIcon');

  text.textContent = message;
  toast.classList.remove('toast-success','toast-error','toast-info');

  if(type === 'error'){
    toast.classList.add('toast-error');
    icon.textContent = '⚠';
  } else if(type === 'success'){
    toast.classList.add('toast-success');
    icon.textContent = '✔';
  } else {
    toast.classList.add('toast-info');
    icon.textContent = 'ℹ';
  }

  toast.classList.remove('show');
  void toast.offsetWidth;
  toast.classList.add('show');

  if(toastTimeout) clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => {
    toast.classList.remove('show');
  }, 3200);
}

function showSecurityToast(){
  showToast('AES-GCM 256 • PBKDF2 120k • random salt & IV','info');
}

/* Theme */

function applyTheme(theme){
  document.documentElement.setAttribute('data-theme', theme);
  const icon = document.getElementById('themeIcon');
  icon.textContent = theme === 'dark' ? '☾' : '☀';
}

function initTheme(){
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  applyTheme(prefersDark ? 'dark' : 'light');
}

function toggleTheme(){
  const current = document.documentElement.getAttribute('data-theme') || 'light';
  const next = current === 'dark' ? 'light' : 'dark';
  manualTheme = next;
  applyTheme(next);
  showToast('Theme: ' + (next === 'dark' ? 'Dark' : 'Light') + ' mode.','info');
}

window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
  if(manualTheme) return;
  applyTheme(e.matches ? 'dark' : 'light');
});

/* TOOLS+QR toggle */

function toggleToolsPanel(){
  const panel = document.getElementById('toolsPanel');
  const btn = document.getElementById('toolsToggleBtn');
  const isHidden = panel.style.display === 'none' || panel.style.display === '';

  if(isHidden){
    panel.style.display = 'block';
    if(btn) btn.textContent = 'CLOSE TOOLS + QR';
    showToast('Tools + QR opened.','info');
  }else{
    panel.style.display = 'none';
    if(btn) btn.textContent = 'TOOLS + QR';
    showToast('Tools + QR hidden.','info');
    // se stava scansionando, fermo la camera
    if(qrScanner && qrScanning){
      qrScanner.stop().then(()=>{
        qrScanner.clear();
        qrScanning = false;
        const scanBtn = document.getElementById('scanBtn');
        if(scanBtn) scanBtn.textContent = 'SCAN QR';
      }).catch(()=>{});
    }
  }
}

/* Password visibility */

function togglePass(){
  const i = document.getElementById('key');
  i.type = i.type === 'password' ? 'text' : 'password';
}

/* Strength meter */

document.getElementById('key').addEventListener('input', updateStrength);

function updateStrength(){
  const v = document.getElementById('key').value;
  const bar = document.getElementById('strengthFill');
  const txt = document.getElementById('strengthText');

  if(!v){
    bar.style.width = '0%';
    txt.innerText = '';
    return;
  }

  let charset = 0;
  if(/[a-z]/.test(v)) charset += 26;
  if(/[A-Z]/.test(v)) charset += 26;
  if(/[0-9]/.test(v)) charset += 10;
  if(/[^A-Za-z0-9]/.test(v)) charset += 33;

  const entropy = v.length * Math.log2(charset || 1);
  const levels = ['Weak','OK','Good','Strong','HIGH'];
  const colors = ['#ff5b73','#ff9800','#ffcf40','#00d4c3','#00ff88'];

  let score = 0;
  if(entropy > 30) score = 1;
  if(entropy > 50) score = 2;
  if(entropy > 70) score = 3;
  if(entropy > 90) score = 4;

  bar.style.width = Math.min(entropy, 100) + '%';
  bar.style.background = colors[score];
  txt.innerText = levels[score] + ' · ' + Math.round(entropy) + ' bits';
}

/* Clear QR when text changes */

document.getElementById('message').addEventListener('input', function(){
  document.getElementById('qrContainer').innerHTML = '';
});

/* Crypto helpers */

function bufToBase64(buf){
  return btoa(String.fromCharCode(...new Uint8Array(buf)));
}

function base64ToBuf(b64){
  return Uint8Array.from(atob(b64), c => c.charCodeAt(0));
}

async function deriveKey(password, salt){
  const keyMaterial = await crypto.subtle.importKey(
    'raw',
    enc.encode(password),
    { name: 'PBKDF2' },
    false,
    ['deriveKey']
  );

  return crypto.subtle.deriveKey(
    {
      name: 'PBKDF2',
      salt: salt,
      iterations: 120000,
      hash: 'SHA-256'
    },
    keyMaterial,
    {
      name: 'AES-GCM',
      length: 256
    },
    false,
    ['encrypt', 'decrypt']
  );
}

/* Encrypt / Decrypt */

async function encrypt(){
  const msg = document.getElementById('message').value;
  const password = document.getElementById('key').value;

  if(!msg || !password){
    showToast('Please enter both text and password.','error');
    return;
  }

  try{
    const salt = crypto.getRandomValues(new Uint8Array(16));
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const key = await deriveKey(password, salt);

    const encrypted = await crypto.subtle.encrypt(
      { name: 'AES-GCM', iv: iv },
      key,
      enc.encode(msg)
    );

    const combined = new Uint8Array(salt.length + iv.length + encrypted.byteLength);
    combined.set(salt, 0);
    combined.set(iv, salt.length);
    combined.set(new Uint8Array(encrypted), salt.length + iv.length);

    document.getElementById('message').value = bufToBase64(combined);
    showToast('Text encrypted successfully.','success');
  }catch(e){
    showToast('Encryption failed.','error');
  }
}

async function decrypt(){
  const data = document.getElementById('message').value;
  const password = document.getElementById('key').value;

  if(!data || !password){
    showToast('Please enter password and encrypted text.','error');
    return;
  }

  try{
    const combined = base64ToBuf(data);
    const salt = combined.slice(0, 16);
    const iv = combined.slice(16, 28);
    const ciphertext = combined.slice(28);
    const key = await deriveKey(password, salt);

    const decrypted = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv: iv },
      key,
      ciphertext
    );

    document.getElementById('message').value = dec.decode(decrypted);
    showToast('Text decrypted successfully.','success');
  }catch(e){
    showToast('Wrong password or corrupted data.','error');
  }
}

/* QR functions */

function generateQR(){
  const data = document.getElementById('message').value;
  if(!data){
    showToast('No data to convert.','error');
    return;
  }

  const container = document.getElementById('qrContainer');
  container.innerHTML = '';

  new QRCode(container, {
    text: data,
    width: 180,
    height: 180,
    correctLevel: QRCode.CorrectLevel.H
  });

  showToast('QR code generated.','success');
}

async function startQRScan(){
  const reader = document.getElementById('qr-reader');
  const scanBtn = document.getElementById('scanBtn');

  if(qrScanner && qrScanning){
    try{
      await qrScanner.stop();
      await qrScanner.clear();
    }catch(e){}
    qrScanning = false;
    reader.innerHTML = '';
    if(scanBtn) scanBtn.textContent = 'SCAN QR';
    showToast('QR scanner stopped.','info');
    return;
  }

  if(!qrScanner){
    qrScanner = new Html5Qrcode('qr-reader');
  }

  Html5Qrcode.getCameras().then(devices => {
    if(devices && devices.length){
      qrScanner.start(
        { facingMode: 'environment' },
        { fps: 10, qrbox: 200 },
        (decodedText) => {
          document.getElementById('message').value = decodedText;
          qrScanner.stop().then(() => {
            qrScanner.clear();
            qrScanning = false;
            if(scanBtn) scanBtn.textContent = 'SCAN QR';
            showToast('QR code captured.','success');
          }).catch(() => {});
        }
      ).then(() => {
        qrScanning = true;
        if(scanBtn) scanBtn.textContent = 'STOP SCAN';
        showToast('Camera active. Point it at a QR code.','info');
      }).catch(() => {
        showToast('Camera not available.','error');
      });
    }
  }).catch(() => {
    showToast('Unable to access camera.','error');
  });
}

/* Share / Copy / Reset / PW / Save / Export */

async function shareText(){
  const text = document.getElementById('message').value.trim();
  if(!text){
    showToast('No text to share.','error');
    return;
  }

  try{
    if(navigator.clipboard?.writeText){
      await navigator.clipboard.writeText(text);
    }
  }catch(e){}

  if(navigator.share){
    try{
      await navigator.share({
        title: 'Enigma³ text',
        text: text
      });
      showToast('Text shared.','success');
    }catch(e){
      showToast('Text copied to clipboard.','info');
    }
  }else{
    showToast('Text copied. Paste into your chat or email.','info');
  }
}

function copyText(){
  navigator.clipboard?.writeText(document.getElementById('message').value || '');
  showToast('Text copied to clipboard.','info');
}

function clearAll(){
  document.getElementById('message').value = '';
  document.getElementById('qrContainer').innerHTML = '';
  showToast('Workspace cleared.','info');
}

function generatePassword(){
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%';
  let p = '';
  for(let i = 0; i < 24; i++){
    p += chars[Math.floor(Math.random() * chars.length)];
  }
  document.getElementById('key').value = p;
  updateStrength();
  showToast('Password generated.','success');
}

function saveQR(){
  const container = document.getElementById('qrContainer');
  const img = container.querySelector('img');
  const canvas = container.querySelector('canvas');
  let dataURL;

  if(img){
    dataURL = img.src;
  }else if(canvas){
    dataURL = canvas.toDataURL('image/png');
  }else{
    showToast('No QR code to save.','error');
    return;
  }

  const a = document.createElement('a');
  a.href = dataURL;
  a.download = 'Enigma3_QR.png';
  a.click();
  showToast('QR code saved.','success');
}

function exportFile(){
  const data = document.getElementById('message').value;
  if(!data){
    showToast('No data to save.','error');
    return;
  }

  const blob = new Blob([data], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'EN3_message.txt';
  a.click();
  showToast('Text file downloaded.','success');
}
